[server]
hostname = "localhost"

[transport.passthru.http.listener]
port=8280

[transport.passthru.https.listener]
port=8243

[user_store]
type = "database"

[keystore.primary]
file_name = "repository/resources/security/wso2carbon.p12"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"
type = "PKCS12"

[truststore]
file_name = "repository/resources/security/client-truststore.p12"
password = "wso2carbon"
alias = "symmetric.key.value"
algorithm = "AES"
type = "PKCS12"

[transport.http]
max_open_connections = 5
core_worker_pool_size = 1
max_worker_pool_size = 1
io_buffer_size = 16384

[management_api.jwt_token_security_handler]
enable = false
