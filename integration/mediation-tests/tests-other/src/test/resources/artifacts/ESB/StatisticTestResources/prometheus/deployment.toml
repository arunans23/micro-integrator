[server]
hostname = "localhost"
# offset  = 10

[user_store]
type = "read_only_ldap"

[keystore.primary]
file_name = "repository/resources/security/wso2carbon.p12"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"
type = "PKCS12"

[truststore]
file_name = "repository/resources/security/client-truststore.p12"
password = "wso2carbon"
alias = "symmetric.key.value"
algorithm = "AES"
type = "PKCS12"

[[synapse_handlers]]
name="CustomObservabilityHandler"
class="org.wso2.micro.integrator.observability.metric.handler.MetricHandler"
