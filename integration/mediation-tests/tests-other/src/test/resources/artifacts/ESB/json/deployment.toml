[server]
hostname = "localhost"
hot_deployment = true

[keystore.primary]
file_name = "repository/resources/security/wso2carbon.p12"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"
type = "PKCS12"

[truststore]
file_name = "repository/resources/security/client-truststore.p12"
password = "wso2carbon"
alias = "symmetric.key.value"
algorithm = "AES"
type = "PKCS12"

[mediation]
synapse.enable_xml_nil = true

[management_api.jwt_token_security_handler]
enable = false

[[synapse_handlers]]
name="TestHandler"
class="org.wso2.carbon.test.gateway.TestHandler"
